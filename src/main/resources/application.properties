spring.application.name=my-spring-app

# ── Database ──────────────────────────────────────────────────────────────────
# 우선순위 1) 로컬 .env → SPRING_DATASOURCE_URL (전체 JDBC URL)
# 우선순위 2) render.yaml fromDatabase → DB_HOST / DB_PORT / DB_NAME
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:csrdb}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JSON ──
spring.jackson.serialization.write-dates-as-timestamps=false
